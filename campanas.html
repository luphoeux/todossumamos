<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campañas Activas | Todos Somos - Qhantuy</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .layout-grid {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 30px;
      margin-top: 40px;
    }
    @media (max-width: 1024px) {
      .layout-grid {
        grid-template-columns: 1fr;
      }
    }
    /* Filtros Sidebar */
    aside {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .filter-section {
      background: transparent;
      margin-bottom: 0;
    }
    .filter-title {
      font-weight: 800;
      margin-bottom: 12px;
      font-size: 16px;
      color: var(--text-dark);
    }
    .checkbox-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 10px;
    }
    .checkbox-group.estado-group {
      display: flex;
      flex-direction: column;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-dark);
      cursor: pointer;
      border: 1px solid var(--border-color);
      padding: 6px 10px;
      border-radius: 6px;
      background: var(--bg-white);
      transition: all 0.2s;
    }
    .checkbox-item:hover { border-color: var(--primary); }
    .checkbox-item input { accent-color: var(--primary); }
    
    .toggle-switch {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    /* Toggle switch CSS */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px; width: 16px;
      left: 2px; bottom: 2px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(20px); }

    .ad-placeholder {
      background-color: #1c0b1f; /* Dark purple/black */
      color: white;
      height: 380px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      text-align: center;
      font-weight: bold;
      font-size: 26px;
      padding-bottom: 40px;
      position: relative;
      overflow: hidden;
    }
    
    /* Grid de Campañas */
    .campaigns-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    @media (max-width: 900px) {
      .campaigns-grid-3 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .campaigns-grid-3 { grid-template-columns: 1fr; }
    }
    
    /* Estilos Tarjeta */
    .card-c {
      background: var(--bg-light);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-img-c {
      height: 190px;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
    }
    .card-img-c img { width: 100%; height: 100%; object-fit: cover; }
    .card-badge {
      position: absolute;
      top: 12px; left: 12px;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      z-index: 2;
    }
    .card-content-c {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    .card-loc { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    .card-title-c {
      font-size: 16px;
      font-weight: 800;
      margin: 0 0 8px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .card-desc-c {
      font-size: 13px; color: var(--text-muted);
      line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 12px;
    }
    .card-progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px; font-weight: 600;
      margin-bottom: 6px;
    }
    .card-progress-bar {
      width: 100%; background: #e0e0e0; height: 6px; border-radius: 4px; margin-bottom: 10px;
    }
    .card-progress-fill { height: 100%; border-radius: 4px; }
    .card-money {
      display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 16px; color: var(--text-dark);
    }
    .btn-c {
      border: 1px solid var(--text-dark);
      border-radius: 24px;
      padding: 8px; text-align: center;
      font-weight: 600; font-size: 13px;
      color: var(--text-dark);
      background: transparent;
      transition: all 0.2s;
    }
    .btn-c:hover { background: var(--bg-white); }
  </style>
</head>
<body>

  <app-header></app-header>

  <main class="container mb-2">
    <div class="layout-grid">
      <aside>
        <div class="filter-section toggle-switch">
          <div>
            <h4 class="filter-title" style="margin-bottom: 4px;">Verificación</h4>
            <span style="font-size: 12px; color: var(--text-muted); display:flex; align-items:center; gap:4px;">
              Mostrar solo verificadas <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--primary)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </span>
          </div>
          <label class="switch">
            <input type="checkbox" id="filter-verified" checked>
            <span class="slider"></span>
          </label>
        </div>
        
        <div class="filter-section">
          <h4 class="filter-title">Buscar Campaña</h4>
          <div style="position: relative;">
            <input type="text" id="filter-search" class="form-control" placeholder="Escribe aquí..." style="padding-left: 36px; border-radius: 8px; font-size: 14px;">
            <svg style="position: absolute; left: 12px; top: 12px; color: var(--text-muted);" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          </div>
        </div>

        <div class="filter-section">
          <h4 class="filter-title">Ubicación</h4>
          <div class="checkbox-group" id="filter-ubicacion">
            <label class="checkbox-item"><input type="checkbox" value="Todos" checked> Todos</label>
            <label class="checkbox-item"><input type="checkbox" value="La Paz"> La Paz</label>
            <label class="checkbox-item"><input type="checkbox" value="Beni"> Beni</label>
            <label class="checkbox-item"><input type="checkbox" value="Cochabamba"> Cochabamba</label>
            <label class="checkbox-item"><input type="checkbox" value="Potosí"> Potosí</label>
            <label class="checkbox-item"><input type="checkbox" value="Santa Cruz"> Santa Cruz</label>
            <label class="checkbox-item"><input type="checkbox" value="Chuquisaca"> Chuquisaca</label>
            <label class="checkbox-item"><input type="checkbox" value="Oruro"> Oruro</label>
            <label class="checkbox-item"><input type="checkbox" value="Tarija"> Tarija</label>
            <label class="checkbox-item"><input type="checkbox" value="Pando"> Pando</label>
          </div>
        </div>

        <div class="filter-section">
          <h4 class="filter-title">Etiquetas</h4>
          <div class="checkbox-group" id="filter-etiquetas">
            <label class="checkbox-item"><input type="checkbox" value="Todos" checked> Todos</label>
            <label class="checkbox-item"><input type="checkbox" value="Animales"> Animales</label>
            <label class="checkbox-item"><input type="checkbox" value="Educación"> Educación</label>
            <label class="checkbox-item"><input type="checkbox" value="Desastres"> Desastres N...</label>
            <label class="checkbox-item"><input type="checkbox" value="Salud"> Salud</label>
            <label class="checkbox-item"><input type="checkbox" value="Comunidad"> Comunidad</label>
          </div>
        </div>

        <div class="filter-section">
          <h4 class="filter-title">Estado</h4>
          <div class="checkbox-group estado-group" id="filter-estado">
            <label class="checkbox-item"><input type="checkbox" value="Todos" checked> Todos</label>
            <label class="checkbox-item"><input type="checkbox" value="Urgentes"> Urgentes</label>
            <label class="checkbox-item"><input type="checkbox" value="Nuevas"> Nuevas</label>
            <label class="checkbox-item"><input type="checkbox" value="Cerca de la meta"> Cerca de la meta</label>
          </div>
        </div>

        <a href="https://www.facebook.com/photo?fbid=1402983821735336" target="_blank" rel="noopener noreferrer" style="display:block; border-radius:12px; overflow:hidden; height:380px; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">
          <img src="images/cam_activas/promo.jpg" alt="Anuncio" style="width:100%; height:100%; object-fit:cover;">
        </a>
      </aside>

      <section>
        <div id="all-campaigns-grid" class="campaigns-grid-3">
          <!-- Populated by JS -->
          <p style="grid-column: 1/-1; text-align:center; padding: 40px;">Cargando campañas...</p>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 40px; padding: 10px 0; border-top: 1px solid var(--border-color);">
          <button style="background:none; border:none; color:var(--text-muted); font-size:14px; font-weight:600; cursor:pointer;" disabled>← Anterior</button>
          <div style="display: flex; gap: 5px;">
            <button style="background:var(--bg-light); border:none; padding:6px 12px; border-radius:4px; font-size:13px; font-weight:600;">1</button>
            <button style="background:none; border:none; padding:6px 12px; border-radius:4px; font-size:13px; color:var(--text-muted); cursor:pointer;">2</button>
            <button style="background:none; border:none; padding:6px 12px; border-radius:4px; font-size:13px; color:var(--text-muted); cursor:pointer;">3</button>
            <span style="padding:6px; color:var(--text-muted);">...</span>
            <button style="background:none; border:none; padding:6px 12px; border-radius:4px; font-size:13px; color:var(--text-muted); cursor:pointer;">8</button>
            <button style="background:none; border:none; padding:6px 12px; border-radius:4px; font-size:13px; color:var(--text-muted); cursor:pointer;">9</button>
            <button style="background:none; border:none; padding:6px 12px; border-radius:4px; font-size:13px; color:var(--text-muted); cursor:pointer;">10</button>
          </div>
          <button style="background:none; border:none; color:var(--text-dark); font-size:14px; font-weight:600; cursor:pointer;">Siguiente →</button>
        </div>
      </section>
    </div>
  </main>

  <app-footer></app-footer>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
