<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | Todos Somos - Qhantuy</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .split-layout {
      display: flex;
      min-height: 100vh;
    }
    .split-left {
      flex: 0 0 720px;
      width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 60px;
      justify-content: center;
      background: var(--bg-white);
    }
    .split-left-inner {
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      display: block;
      margin-bottom: 24px;
    }
    .login-logo img {
      height: 44px;
      width: auto;
    }
    .split-right {
      flex: 1;
      display: none;
      position: relative;
      overflow: hidden;
    }
    @media (min-width: 1024px) {
      .split-right {
        display: block;
      }
    }

    /* ── Carousel ── */
    .carousel-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      will-change: opacity;
    }
    .carousel-slide.active {
      opacity: 1;
    }
    /* 60% black overlay */
    .carousel-slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.60);
    }

    /* Caption positioned over the overlay */
    .carousel-caption {
      position: absolute;
      bottom: 40px;
      right: 40px;
      text-align: right;
      color: #ffffff;
      z-index: 10;
      max-width: 320px;
    }
    .carousel-caption p {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.5;
      text-shadow: 0 1px 4px rgba(0,0,0,.5);
    }
    .carousel-dots {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    .carousel-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      transition: background 0.4s;
      cursor: pointer;
    }
    .carousel-dots span.active {
      background: #ffffff;
    }
    
    /* Grid for side-by-side inputs */
    .form-row {
      display: flex;
      gap: 12px;
    }
    .form-row .form-group {
      flex: 1;
    }
    
    /* Compact overrides to prevent scrolling */
    .form-group { margin-bottom: 12px; }
    .form-control { padding: 10px 14px; font-size: 15px; }
    .btn { padding: 12px 24px; font-size: 15px; }
    .form-label { margin-bottom: 4px; font-size: 13px; }
  </style>
</head>
<body style="background-color: var(--bg-white);">


  <div class="split-layout">
    <div class="split-left">
      <div class="split-left-inner">

        <!-- Logo → Home -->
        <a href="index.html" class="login-logo">
          <img src="images/todos somos images/logo_color.svg" alt="Todos Somos – Qhantuy">
        </a>

        <h1 style="font-size: 28px; margin-bottom: 4px;">Crea tu cuenta</h1>
        <p style="color: var(--text-muted); margin-bottom: 20px;">Únete y empieza a generar impacto hoy.</p>

        <form id="register-form">
          <div class="form-group">
            <label class="form-label">Nombre completo *</label>
            <input type="text" class="form-control" placeholder="Ej. Juan Pérez" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Correo electrónico *</label>
            <input type="email" class="form-control" placeholder="Ingresa tu correo electrónico" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">País *</label>
              <select class="form-control" required>
                <option value="BO" selected>Bolivia</option>
                <option value="AR">Argentina</option>
                <option value="CL">Chile</option>
                <option value="US">Estados Unidos</option>
                <option value="ES">España</option>
                <option value="OT">Otro</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Celular <span style="color: var(--text-muted); font-size: 12px;">(Opcional)</span></label>
              <input type="tel" class="form-control" placeholder="Ej. 70012345">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Contraseña *</label>
            <input type="password" class="form-control" placeholder="••••••••" required minlength="8">
          </div>
          <div class="form-group">
            <label class="form-label">Confirmar contraseña *</label>
            <input type="password" class="form-control" placeholder="••••••••" required minlength="8">
          </div>

          <button type="submit" class="btn btn-primary btn-full" style="margin-bottom: 12px;">Registrarse</button>

          <div style="text-align: center; margin: 10px 0 16px; color: var(--text-muted); font-size: 13px;">O</div>

          <button type="button" class="btn btn-outline btn-full" style="display: flex; gap: 10px; justify-content: center;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Registrarse con Google
          </button>
        </form>

        <p class="text-center" style="font-size: 14px; margin-top: 20px;">
          ¿Ya tienes una cuenta? <a href="login.html" style="color: var(--primary); font-weight: 600;">Inicia sesión</a>
        </p>

        <p style="margin-top: 20px; font-size: 12px; color: var(--text-muted); text-align: center;">
          # TodosSumamos2026
        </p>
      </div>
    </div>

    <div class="split-right">
      <!-- Slide 1 -->
      <div class="carousel-slide active"
           style="background-image: url('images/todos somos images/login_1.jpg');"
           data-index="0">
      </div>
      <!-- Slide 2 -->
      <div class="carousel-slide"
           style="background-image: url('images/todos somos images/login_2.jpg');"
           data-index="1">
      </div>
      <!-- Slide 3 -->
      <div class="carousel-slide"
           style="background-image: url('images/todos somos images/login_3.jpg');"
           data-index="2">
      </div>

      <!-- Caption -->
      <div class="carousel-caption">
        <p>Más de 5.000 bolivianos ya se han unido y donaron.</p>
      </div>

      <!-- Dots -->
      <div class="carousel-dots" id="carousel-dots">
        <span class="active" data-dot="0"></span>
        <span data-dot="1"></span>
        <span data-dot="2"></span>
      </div>
    </div>
  </div>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      const slides = document.querySelectorAll('.carousel-slide');
      const dots   = document.querySelectorAll('#carousel-dots span');
      let current  = 0;
      const INTERVAL = 7000; // 7 segundos

      function goTo(index) {
        slides[current].classList.remove('active');
        dots[current].classList.remove('active');
        current = (index + slides.length) % slides.length;
        slides[current].classList.add('active');
        dots[current].classList.add('active');
      }

      // Auto-play
      let timer = setInterval(() => goTo(current + 1), INTERVAL);

      // Click on dots
      dots.forEach(dot => {
        dot.addEventListener('click', () => {
          clearInterval(timer);
          goTo(+dot.dataset.dot);
          timer = setInterval(() => goTo(current + 1), INTERVAL);
        });
      });
    })();
  </script>
</body>
</html>
